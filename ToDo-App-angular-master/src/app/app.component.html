<header class="navbar navbar-expand-lg bg-light border-bottom py-2">
  <div class="container">
    <a class="navbar-brand fw-semibold text-dark" routerLink="/"> My Tasks </a>

    <div class="d-flex align-items-center gap-3 ms-auto">
      <div class="search-box">
        <input
          type="text"
          class="form-control"
          placeholder="Find task..."
          #searchInput
          (input)="todoService.searchWord.set(searchInput.value)"
        />
      </div>

      <button class="btn btn-outline-secondary" routerLink="/tasks">Tasks</button>

      <button class="btn btn-primary" routerLink="/newTask">New Task</button>
    </div>
  </div>
</header>

<section class="container my-4 flex-fill">
  <h3 class="mb-4">Task Manager</h3>

  <div class="task-wrapper">
    <router-outlet></router-outlet>
  </div>
</section>

<footer class="text-center border-top py-3 bg-light">
  <small>© 2026 Task Manager App</small>
</footer>
