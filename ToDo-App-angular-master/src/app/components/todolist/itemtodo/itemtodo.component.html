<div class="card shadow-sm border-0 mb-3">
  <div class="card-body p-3">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h5 class="card-title mb-1 fw-bold">{{ task.title }}</h5>
        <p class="card-text text-muted small mb-2">
          {{ task.description }}
        </p>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-warning" [routerLink]="['/editTask', task.id]">
          ✏
        </button>

        <button class="btn btn-sm btn-outline-danger" (click)="deleteTask(task.id)">✖</button>
      </div>
    </div>

    <div class="text-end">
      <small class="text-secondary">
        {{ task.date | date: 'mediumDate' }}
      </small>
    </div>
  </div>
</div>
